let room=(params.get('host')||params.get('join')||'').toUpperCase().replace(/[^A-Z0-9]/g,'');

SS.setItem('archcmu_pid',pid);

let transport=null,state=null,hostAnswers={},timerHandle=null,connection='offline',brokerLabel='',soundOn=LS.getItem('archcmu_sound')!=='off',audioCtx=null,previewIndex=0,systemResults=null;
let submittedByQuestion=JSON.parse(SS.getItem('archcmu_submitted')||'{}');

function randomId(n=8){const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';const a=new Uint8Array(n);crypto.getRandomValues(a);return [...a].map(x=>chars[x%chars.length]).join('')}
function fmtRoom(v){return v.length===8?v.slice(0,4)+'-'+v.slice(4):v}
function esc(s=''){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
function setConnection(value,label=''){connection=value;brokerLabel=label||brokerLabel;const el=document.querySelector('.status');if(el){el.className='status '+value;el.innerHTML=`<span class="statusDot"></span>${value==='live'?'Live':value==='connecting'?'Connecting':value==='reconnecting'?'Reconnecting':'Offline'}`}}
function shell(content,statusText='Ph.D. Homeroom 1/2026'){
 app.innerHTML=`<div class="shell"><header class="topbar"><div class="brand"><div class="brandMark">A</div><div><strong>ARCHCMU Global Challenge</strong><small>Space · City · Culture · Community</small></div></div><div class="topRight"><button class="iconBtn" id="soundBtn" aria-label="Toggle sound">${soundOn?'🔊':'🔇'}</button><div class="status ${connection}"><span class="statusDot"></span>${connection==='live'?'Live':connection==='connecting'?'Connecting':connection==='reconnecting'?'Reconnecting':'Offline'}</div></div></header><main class="main">${content}</main><footer class="footer">Faculty of Architecture · Chiang Mai University · ${EVENT_DATE}</footer></div>`;
 document.getElementById('soundBtn')?.addEventListener('click',toggleSound);
}
function toggleSound(){soundOn=!soundOn;LS.setItem('archcmu_sound',soundOn?'on':'off');document.getElementById('soundBtn').textContent=soundOn?'🔊':'🔇';if(soundOn)tone(520,.07)}
function tone(freq=540,dur=.12,type='sine'){if(!soundOn)return;try{audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(.0001,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.16,audioCtx.currentTime+.015);g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+dur);o.connect(g).connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur+.02)}catch{}}
function playResult(ok){tone(ok?760:180,ok?.18:.25,ok?'sine':'sawtooth')}
function playStart(){tone(420,.09);setTimeout(()=>tone(620,.1),120);setTimeout(()=>tone(820,.14),250)}

function home(){role='home';setConnection('offline');shell(`<section class="hero"><div class="panel heroCopy"><div class="eyebrow">ARCHCMU Ph.D. Homeroom 1/2026</div><h1>Live Quiz</h1><p class="lead">Choose one button. The host creates the room; everyone else scans the QR code and joins.</p><div class="actions"><button class="btn primary" id="hostBtn">1. Host the Game</button><button class="btn gold" id="joinBtn">2. Join the Game</button></div><div class="rewardStrip"><div class="reward"><span class="medal">🥇</span><b>Architecture & Culture Champion</b></div><div class="reward"><span class="medal">🥈</span><b>Spatial Thinker</b></div><div class="reward"><span class="medal">🥉</span><b>Community Connector</b></div></div><p class="privacy">Host: click the first button. Participants: scan the QR code shown by the host.</p></div><div class="heroVisual"><img src="${Q[28].image}" alt="Award illustration" style="width:100%;height:100%;object-fit:cover"><div class="heroCaption"><strong>Scan · Answer · Win</strong><span>30 questions · live points · final Top 3</span></div></div></section>`);hostBtn.onclick=createHost;joinBtn.onclick=showJoinForm}
function loading(msg='Connecting to the live room…'){shell(`<section class="panel center"><div class="loader"></div><h2>${esc(msg)}</h2><p class="lead" style="margin:auto">Please keep this page open.</p></section>`,'Connecting')}
function errorScreen(title,msg){shell(`<section class="panel center"><div class="bigIcon">⚠️</div><h2>${esc(title)}</h2><p class="lead" style="margin:0 auto 18px">${esc(msg)}</p><div class="actions" style="justify-content:center"><button class="btn primary" id="homeBtn">Back Home</button><button class="btn soft" id="retryBtn">Reconnect</button></div></section>`,'Connection issue');homeBtn.onclick=()=>location.href=location.pathname;retryBtn.onclick=()=>location.reload()}

function loadScript(urls,test){return new Promise((resolve,reject)=>{if(test())return resolve();let i=0;const next=()=>{if(i>=urls.length)return reject(new Error('Required library could not be loaded.'));const s=document.createElement('script');s.src=urls[i++];s.onload=()=>test()?resolve():next();s.onerror=next;document.head.appendChild(s)};next()})}
async function loadLibraries(needsMqtt=true){await loadScript(['https://cdn.jsdelivr.net/npm/qrcode-generator@2.0.4/dist/qrcode.js','https://unpkg.com/qrcode-generator@2.0.4/dist/qrcode.js'],()=>typeof window.qrcode==='function');if(needsMqtt&&!LOCAL_MODE)await loadScript(['https://cdn.jsdelivr.net/npm/mqtt@5.15.1/dist/mqtt.min.js','https://unpkg.com/mqtt@5.15.1/dist/mqtt.min.js'],()=>window.mqtt&&typeof window.mqtt.connect==='function')}

class LocalTransport{
 constructor(roomCode,handler,statusHandler){this.room=roomCode;this.handler=handler;this.statusHandler=statusHandler;this.channel=new BroadcastChannel('archcmu-vq-'+roomCode);this.channel.onmessage=e=>handler(e.data.topic,e.data.payload);this.statusHandler('live','Local rehearsal')}
 subscribe(topic){if(topic.endsWith('/state')){const v=LS.getItem('archcmu_state_'+this.room);if(v)setTimeout(()=>this.handler(topic,v),50)}}
 publish(topic,payload,{retain=false}={}){if(retain&&topic.endsWith('/state')){if(payload)LS.setItem('archcmu_state_'+this.room,payload);else LS.removeItem('archcmu_state_'+this.room)}this.channel.postMessage({topic,payload})}
 end(){this.channel.close()}
}
class MqttTransport{
 constructor(handler,statusHandler){this.handler=handler;this.statusHandler=statusHandler;this.client=null;this.brokerIndex=0}
 async connect(){return this.tryBroker(0)}
 tryBroker(i){return new Promise((resolve,reject)=>{if(i>=BROKERS.length)return reject(new Error('All live brokers are unavailable. Check the network and press Reconnect.'));this.brokerIndex=i;this.statusHandler('connecting',BROKERS[i]);let settled=false,moved=false;const c=window.mqtt.connect(BROKERS[i],{clientId:'archcmu_'+pid+'_'+Date.now().toString(36),clean:true,keepalive:25,reconnectPeriod:0,connectTimeout:8000});this.client=c;const moveNext=()=>{if(settled||moved)return;moved=true;clearTimeout(failTimer);try{c.end(true)}catch{}this.tryBroker(i+1).then(resolve).catch(reject)};const failTimer=setTimeout(moveNext,9000);c.once('connect',()=>{if(moved)return;settled=true;clearTimeout(failTimer);c.options.reconnectPeriod=2500;this.statusHandler('live',BROKERS[i]);resolve(this)});c.once('error',moveNext);c.on('reconnect',()=>this.statusHandler('reconnecting',BROKERS[i]));c.on('offline',()=>this.statusHandler('offline',BROKERS[i]));c.on('close',()=>{if(settled)this.statusHandler('reconnecting',BROKERS[i])});c.on('message',(t,b)=>this.handler(t,b.toString()))})}
 subscribe(topic){this.client.subscribe(topic,{qos:1})}
 publish(topic,payload,{retain=false}={}){this.client.publish(topic,payload,{qos:1,retain})}
 end(){this.client?.end(true)}
}
function baseTopic(){return `archcmu/vibequiz/2026/${room.toLowerCase()}`}
function stateTopic(){return baseTopic()+'/state'}
function eventTopic(){return baseTopic()+'/event/'+pid}
function publish(topic,obj,retain=false){transport?.publish(topic,typeof obj==='string'?obj:JSON.stringify(obj),{retain})}
function handleTransportStatus(s,label){setConnection(s,label);if(s==='live'&&role==='host'&&state)publishState()}
async function connectTransport(currentRole){await loadLibraries(currentRole==='host'||currentRole==='player');const handler=(topic,payload)=>currentRole==='host'?onHostMessage(topic,payload):onPlayerMessage(topic,payload);transport=LOCAL_MODE?new LocalTransport(room,handler,handleTransportStatus):await new MqttTransport(handler,handleTransportStatus).connect();transport.subscribe(currentRole==='host'?baseTopic()+'/#':stateTopic())}

function rankPlayers(players=state?.players||{}){return Object.entries(players).map(([id,p])=>({id,...p})).sort((a,b)=>(b.score||0)-(a.score||0)||(b.correctCount||0)-(a.correctCount||0)||(a.totalResponseTime||0)-(b.totalResponseTime||0)||(a.joinedAt||0)-(b.joinedAt||0))}
function leaderboardHtml(limit=8){const arr=rankPlayers().slice(0,limit);return arr.length?`<div class="leaderboard">${arr.map((p,i)=>`<div class="rankRow"><div class="rank">#${i+1}</div><div>${esc(p.name||'Player')}<small style="display:block;color:var(--muted)">${p.correctCount||0} correct</small></div><div class="score">${p.score||0}</div></div>`).join('')}</div>`:'<p class="lead" style="font-size:14px">No participants yet.</p>'}
function publishState(){if(!state)return;state.updatedAt=Date.now();publish(stateTopic(),state,true);SS.setItem('archcmu_host_state',JSON.stringify(state));SS.setItem('archcmu_host_answers',JSON.stringify(hostAnswers))}
function onHostMessage(topic,payload){let m;try{m=JSON.parse(payload)}catch{return}if(topic===stateTopic())return;if(!m||!m.type)return;if(m.type==='join'||m.type==='heartbeat'){if(Date.now()>state.expiresAt)return;const old=state.players[m.pid]||{};state.players[m.pid]={name:String(m.name||old.name||'Player').slice(0,28),score:old.score||0,correctCount:old.correctCount||0,incorrectCount:old.incorrectCount||0,totalResponseTime:old.totalResponseTime||0,joinedAt:old.joinedAt||m.at||Date.now(),lastSeen:Date.now(),online:true,lastPoints:old.lastPoints||0,lastCorrect:old.lastCorrect||false};publishState();renderHost()}else if(m.type==='answer'&&state.phase==='question'&&m.questionIndex===state.questionIndex){hostAnswers[m.questionIndex]??={};if(!hostAnswers[m.questionIndex][m.pid]){hostAnswers[m.questionIndex][m.pid]={choice:Number(m.choice),answeredAt:Number(m.answeredAt)||Date.now()};state.answerCount=Object.keys(hostAnswers[m.questionIndex]).length;publishState();renderHost()}}}
function onPlayerMessage(topic,payload){if(topic!==stateTopic())return;if(!payload){return errorScreen('Room ended','The host has ended this room.')}let next;try{next=JSON.parse(payload)}catch{return}if(next.expiresAt&&Date.now()>next.expiresAt)return errorScreen('Room expired','This room is more than four hours old. Ask the host to create a new room.');state=next;renderPlayer()}

async function createHost(){role='host';room=randomId(8);history.replaceState(null,'',location.pathname+'?host='+room+(LOCAL_MODE?'&local=1':''));hostAnswers={};state={version:4,room,createdAt:Date.now(),expiresAt:Date.now()+4*60*60*1000,phase:'lobby',questionIndex:-1,questionStartedAt:0,paused:false,pausedRemaining:0,answerCount:0,stats:null,players:{},ended:false};setConnection('connecting','Preparing live room');renderHost();try{await loadLibraries(false).catch(()=>{});renderHost();await connectTransport('host');publishState();setInterval(()=>{if(state&&role==='host'&&connection==='live')publishState()},7000);renderHost()}catch(e){setConnection('offline',e.message);brokerLabel=e.message;renderHost()}}
function showJoinForm(){role='player';shell(`<section class="panel" style="max-width:620px;margin:auto"><div class="eyebrow">Participant</div><h2>Join the Game</h2><p class="lead">Scan the host QR code. Your room code will appear automatically.</p><label class="field"><span>Room code</span><input id="roomInput" maxlength="9" value="${room?fmtRoom(room):''}" placeholder="ABCD-2345" inputmode="text"></label><label class="field"><span>Your name</span><input id="nameInput" maxlength="28" value="${esc(displayName)}" placeholder="Type your name"></label><button class="btn gold block" id="joinNow">Join Now</button><p class="privacy">Use only a display name. Do not enter private information.</p><div class="actions"><button class="btn soft" id="backBtn">Back</button></div></section>`,'Join');joinNow.onclick=joinRoom;backBtn.onclick=home}
async function joinRoom(){room=roomInput.value.toUpperCase().replace(/[^A-Z0-9]/g,'');displayName=nameInput.value.trim().slice(0,28);if(room.length!==8||!displayName)return alert('Enter an eight-character room key and a display name.');SS.setItem('archcmu_name',displayName);history.replaceState(null,'',location.pathname+'?join='+room+(LOCAL_MODE?'&local=1':''));loading('Joining '+fmtRoom(room)+'…');setConnection('connecting');try{await connectTransport('player');publish(eventTopic(),{type:'join',pid,name:displayName,at:Date.now()});let found=false;const wait=setInterval(()=>{if(state){found=true;clearInterval(wait)}},200);setTimeout(()=>{if(!found)errorScreen('Room not found','Check the room key or ask the host to keep the lobby open.')},5500);setInterval(()=>publish(eventTopic(),{type:'heartbeat',pid,name:displayName,at:Date.now()}),9000)}catch(e){errorScreen('Unable to join',e.message)}}

function joinUrl(){const base=location.origin==='null'?location.href.split('?')[0]:location.origin+location.pathname;return `${base}?join=${room}${LOCAL_MODE?'&local=1':''}`}
function makeQr(el,text){try{if(typeof window.qrcode!=='function')throw new Error('QR library loading');const qr=window.qrcode(0,'M');qr.addData(text);qr.make();el.innerHTML=qr.createImgTag(7,12,'Scan to join ARCHCMU Global Challenge')}catch{const fallback='https://api.qrserver.com/v1/create-qr-code/?size=320x320&margin=12&data='+encodeURIComponent(text);el.innerHTML='<img src="'+fallback+'" alt="Scan to join ARCHCMU Global Challenge"><div class="joinUrl">QR fallback · the join link below is also active</div>'}}
function renderHost(){clearInterval(timerHandle);if(!state)return;if(state.phase==='lobby')hostLobby();else if(state.phase==='question')hostQuestion();else if(state.phase==='results')hostResults();else if(state.phase==='finished')hostFinished()}
function hostLobby(){const players=rankPlayers();const ready=connection==='live'&&Q.length===30;shell(`<section class="hostGrid"><div class="panel center"><div class="eyebrow">STEP 1 · Ask everyone to scan</div><div class="roomKey">${fmtRoom(room)}</div><div class="qrBox" id="qrBox"></div><div class="joinUrl">${esc(joinUrl())}</div><button class="btn soft" id="copyLink">Copy Link for Zoom</button><div class="connectionBanner">${ready?'✅ Ready':'⏳ Connecting…'}<br><small>${ready?'You may start now. Participants can also join a little later.':'Wait until the top-right status says Live.'}</small></div><div class="eyebrow" style="margin-top:18px">STEP 2 · Check joined names</div><h2>${players.length} joined</h2><div class="chips">${players.map(p=>`<span class="chip">${esc(p.name)}</span>`).join('')||'<span class="chip">Waiting for participants…</span>'}</div><div class="eyebrow" style="margin-top:18px">STEP 3 · Start</div><button class="btn gold block" id="startGame" ${ready?'':'disabled'}>Start Game</button><div class="actions" style="justify-content:center;margin-top:12px"><button class="btn soft" id="reconnectBtn">Retry Connection</button><button class="btn danger" id="endRoom">End Room</button></div></div><aside class="sidebar"><div class="panel"><h3>Prizes</h3><p>🥇 Architecture & Culture Champion<br>🥈 Spatial Thinker<br>🥉 Community Connector</p></div><div class="panel"><h3>Very simple rule</h3><p>1. Wait for <b>Live</b><br>2. Let people scan<br>3. Press <b>Start Game</b></p></div></aside></section>`,`Room ${fmtRoom(room)}`);makeQr(qrBox,joinUrl());copyLink.onclick=copyJoin;startGame.onclick=()=>startQuestion(0);reconnectBtn.onclick=reconnectHost;endRoom.onclick=endRoomNow}
async function reconnectHost(){setConnection('connecting','Reconnecting');renderHost();try{transport?.end();await connectTransport('host');publishState();renderHost()}catch(e){setConnection('offline',e.message);brokerLabel=e.message;renderHost()}}
async function copyJoin(){try{await navigator.clipboard.writeText(joinUrl());alert('Join link copied.')}catch{prompt('Copy this join link:',joinUrl())}}
function questionCard(q,reveal=false,chosen=null){return `<article class="panel questionCard"><img class="questionImage" src="${esc(q.image)}" alt="Illustration for question ${q.id}"><div class="questionBody"><span class="category">${esc(q.category)}</span><h2 class="questionTitle">${esc(q.question)}</h2><div class="options">${q.answers.map((a,i)=>{let cls='';if(reveal){cls=i===q.correctIndex?'correct':chosen===i?'wrong chosenWrong':'wrong'}else if(chosen===i)cls='selected';return `<button class="option ${cls}" data-choice="${i}" ${reveal?'disabled':''} aria-label="Answer ${String.fromCharCode(65+i)}: ${esc(a)}"><span class="letter">${String.fromCharCode(65+i)}</span><span>${esc(a)}</span></button>`}).join('')}</div></div></article>`}
function startQuestion(index){submittedByQuestion[index]=undefined;hostAnswers[index]={};state.phase='question';state.questionIndex=index;state.questionStartedAt=Date.now();state.paused=false;state.pausedRemaining=0;state.answerCount=0;state.stats=null;Object.values(state.players).forEach(p=>{p.lastPoints=0;p.lastCorrect=false});publishState();playStart();renderHost()}
function remainingMs(q){if(state.paused)return state.pausedRemaining;return Math.max(0,q.timeLimit*1000-(Date.now()-state.questionStartedAt))}
function runClock(q,hostSide){const tick=()=>{const ms=remainingMs(q),sec=Math.ceil(ms/1000),t=document.getElementById('timer'),b=document.getElementById('timeBar');if(t){t.textContent=sec;t.classList.toggle('urgent',sec<=5&&!state.paused)}if(b)b.style.width=Math.max(0,ms/(q.timeLimit*1000)*100)+'%';if(!hostSide&&ms<=0)document.querySelectorAll('.option').forEach(x=>x.disabled=true)};tick();timerHandle=setInterval(tick,160)}
function hostQuestion(){const q=Q[state.questionIndex];shell(`<section class="hostGrid">${questionCard(q)}<aside class="sidebar"><div class="panel center"><div class="timer" id="timer">${q.timeLimit}</div><div class="progress" style="margin-top:13px"><div id="timeBar" style="width:100%"></div></div><p>${state.paused?'Timer paused':'Time remaining'}</p></div><div class="panel center"><div class="answerCount">${state.answerCount||0}</div><p>answers submitted</p></div><button class="btn ${state.paused?'success':'soft'}" id="pauseBtn">${state.paused?'Resume Timer':'Pause Timer'}</button><button class="btn gold" id="revealBtn">Reveal Answer</button><button class="btn soft" id="skipBtn">Skip Question</button><button class="btn danger" id="endBtn">End Game</button></aside></section>`,`Question ${state.questionIndex+1} / ${Q.length}`);document.querySelectorAll('.option').forEach(x=>x.disabled=true);pauseBtn.onclick=togglePause;revealBtn.onclick=()=>revealAnswer(false);skipBtn.onclick=()=>revealAnswer(true);endBtn.onclick=()=>{if(confirm('End the game and show final results?')){state.phase='finished';publishState();renderHost()}};runClock(q,true)}
function togglePause(){const q=Q[state.questionIndex];if(!state.paused){state.pausedRemaining=remainingMs(q);state.paused=true}else{state.questionStartedAt=Date.now()-(q.timeLimit*1000-state.pausedRemaining);state.paused=false}publishState();renderHost()}
function revealAnswer(skipped=false){const q=Q[state.questionIndex],answers=hostAnswers[state.questionIndex]||{},stats=[0,0,0,0];Object.values(answers).forEach(a=>stats[a.choice]++);Object.entries(state.players).forEach(([id,p])=>{const a=answers[id];let points=0,correct=false,response=0;if(a){response=Math.max(0,Math.min(q.timeLimit*1000,a.answeredAt-state.questionStartedAt));correct=!skipped&&a.choice===q.correctIndex;if(correct)points=500+Math.round(500*(1-response/(q.timeLimit*1000)));p.totalResponseTime=(p.totalResponseTime||0)+response;if(correct)p.correctCount=(p.correctCount||0)+1;else p.incorrectCount=(p.incorrectCount||0)+1}else if(!skipped)p.incorrectCount=(p.incorrectCount||0)+1;p.score=(p.score||0)+points;p.lastPoints=points;p.lastCorrect=correct;p.lastChoice=a?a.choice:null});state.phase='results';state.stats=stats;publishState();tone(720,.16);renderHost()}
function hostResults(){const q=Q[state.questionIndex],stats=state.stats||[0,0,0,0];shell(`<section class="hostGrid"><div>${questionCard(q,true)}<div class="resultPanel"><h3>Correct answer: ${esc(q.answers[q.correctIndex])}</h3><p>${esc(q.explanation)}</p><div class="answerStats">${q.answers.map((a,i)=>`<div class="statChoice"><b>${String.fromCharCode(65+i)} · ${stats[i]||0} responses</b><br><small>${esc(a)}</small></div>`).join('')}</div></div></div><aside class="sidebar"><div class="panel"><div class="eyebrow">Live Leaderboard</div>${leaderboardHtml(8)}</div><button class="btn gold" id="nextBtn">${state.questionIndex+1<Q.length?'Next Question':'Show Final Podium'}</button><button class="btn danger" id="endBtn">End Room</button></aside></section>`,`Results ${state.questionIndex+1} / ${Q.length}`);nextBtn.onclick=()=>state.questionIndex+1<Q.length?startQuestion(state.questionIndex+1):finishGame();endBtn.onclick=endRoomNow}
function finishGame(){state.phase='finished';publishState();renderHost();celebrate()}
function awardForRank(r){return r===1?'Architecture & Culture Champion':r===2?'Spatial Thinker':r===3?'Community Connector':''}
function hostFinished(){const arr=rankPlayers(),p=i=>arr[i]||{name:'—',score:0,correctCount:0};shell(`<section class="panel center"><div class="eyebrow">Final Awards</div><h2>ARCHCMU Global Challenge</h2><div class="podium"><div class="second"><div class="medal">🥈</div><b>${esc(p(1).name)}</b><span>${p(1).score} points · ${p(1).correctCount||0} correct</span><br><small>Spatial Thinker</small></div><div class="first"><div class="medal">🥇</div><b>${esc(p(0).name)}</b><span>${p(0).score} points · ${p(0).correctCount||0} correct</span><br><small>Architecture & Culture Champion</small></div><div class="third"><div class="medal">🥉</div><b>${esc(p(2).name)}</b><span>${p(2).score} points · ${p(2).correctCount||0} correct</span><br><small>Community Connector</small></div></div><p class="lead" style="margin:24px auto;max-width:780px">The Top 3 receive small prizes and may voluntarily join the next Ph.D. Homeroom organising team in a role they choose.</p><div class="actions" style="justify-content:center"><button class="btn primary" id="csvBtn">Download Results CSV</button><button class="btn gold" id="restartBtn">Restart Game</button><button class="btn danger" id="endBtn">End Room</button></div></section>`,'Final podium');csvBtn.onclick=downloadCsv;restartBtn.onclick=restartGame;endBtn.onclick=endRoomNow}
function restartGame(){Object.values(state.players).forEach(p=>{p.score=0;p.correctCount=0;p.incorrectCount=0;p.totalResponseTime=0;p.lastPoints=0;p.lastCorrect=false});hostAnswers={};state.phase='lobby';state.questionIndex=-1;state.stats=null;state.answerCount=0;publishState();renderHost()}
function endRoomNow(){if(!confirm('End and clear this room?'))return;state.ended=true;publishState();setTimeout(()=>{transport?.publish(stateTopic(),'',{retain:true});if(LOCAL_MODE)LS.removeItem('archcmu_state_'+room);transport?.end();location.href=location.pathname},300)}
function downloadCsv(){const arr=rankPlayers(),rows=[['Rank','Display Name','Total Score','Correct Answers','Incorrect Answers','Average Response Time (s)','Join Time']];arr.forEach((p,i)=>rows.push([i+1,p.name,p.score||0,p.correctCount||0,p.incorrectCount||0,p.correctCount+p.incorrectCount?((p.totalResponseTime||0)/(p.correctCount+p.incorrectCount)/1000).toFixed(2):'0.00',new Date(p.joinedAt||Date.now()).toISOString()]));const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n'),blob=new Blob([csv],{type:'text/csv'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ARCHCMU_Global_Challenge_Results.csv';a.click();URL.revokeObjectURL(a.href)}

function renderPlayer(){clearInterval(timerHandle);if(!state)return;if(state.ended)return errorScreen('Room ended','The host has ended this room.');if(state.phase==='lobby')playerLobby();else if(state.phase==='question')playerQuestion();else if(state.phase==='results')playerResults();else if(state.phase==='finished')playerFinished()}
function me(){return state?.players?.[pid]||{name:displayName,score:0,correctCount:0}}
function playerLobby(){shell(`<section class="panel center" style="max-width:780px;margin:auto"><div class="eyebrow">You are in!</div><div class="roomKey">${fmtRoom(room)}</div><h2>Welcome, ${esc(displayName)}</h2><p class="lead" style="margin:auto">The host will start the first question soon. Keep this page open.</p><div class="loader"></div><p>${rankPlayers().length} participants joined</p></section>`,'Waiting room')}
function playerQuestion(){const q=Q[state.questionIndex],submitted=submittedByQuestion[state.questionIndex];shell(`<section style="max-width:950px;margin:auto"><div class="panel" style="margin-bottom:13px;display:flex;align-items:center;gap:16px"><div class="timer" id="timer" style="width:76px;height:76px;border-width:8px;font-size:25px">${q.timeLimit}</div><div style="flex:1"><div class="eyebrow">Question ${state.questionIndex+1} / ${Q.length}</div><div class="progress"><div id="timeBar" style="width:100%"></div></div></div></div>${questionCard(q,false,submitted?.choice??null)}<div class="notice blue ${submitted?'':'hidden'}" style="margin-top:13px">Answer submitted. Wait for the host to reveal the result.</div></section>`,`Room ${fmtRoom(room)}`);document.querySelectorAll('.option').forEach(b=>{if(submitted)b.disabled=true;b.onclick=()=>submitAnswer(Number(b.dataset.choice))});runClock(q,false)}
function submitAnswer(choice){const i=state.questionIndex;if(submittedByQuestion[i])return;if(remainingMs(Q[i])<=0)return;submittedByQuestion[i]={choice,at:Date.now()};SS.setItem('archcmu_submitted',JSON.stringify(submittedByQuestion));publish(eventTopic(),{type:'answer',pid,name:displayName,questionIndex:i,choice,answeredAt:Date.now()});tone(480,.06);playerQuestion()}
function playerResults(){const q=Q[state.questionIndex],p=me(),chosen=p.lastChoice??submittedByQuestion[state.questionIndex]?.choice??null,rank=rankPlayers().findIndex(x=>x.id===pid)+1;playResult(!!p.lastCorrect);shell(`<section style="max-width:950px;margin:auto">${questionCard(q,true,chosen)}<div class="panel resultPanel ${p.lastCorrect?'':'bad'} center"><div class="bigIcon">${p.lastCorrect?'✅':'❌'}</div><h2>${p.lastCorrect?'Correct!':'Not this time'}</h2><p>${esc(q.explanation)}</p><div class="metrics"><div class="metric"><b>+${p.lastPoints||0}</b><span>this question</span></div><div class="metric"><b>${p.score||0}</b><span>total points</span></div><div class="metric"><b>#${rank||'—'}</b><span>current rank</span></div><div class="metric"><b>${p.correctCount||0}</b><span>correct answers</span></div></div><p>Waiting for the next question…</p></div></section>`,'Answer explained')}
function playerFinished(){const arr=rankPlayers(),rank=arr.findIndex(x=>x.id===pid)+1,p=me(),award=awardForRank(rank);if(rank&&rank<=3)celebrate();shell(`<section class="panel center" style="max-width:800px;margin:auto"><div class="eyebrow">Your Final Result</div><h2>Thank you, ${esc(displayName)}!</h2>${award?`<div class="awardName">${rank===1?'🥇':rank===2?'🥈':'🥉'} ${award}</div>`:''}<div class="metrics" style="grid-template-columns:repeat(3,1fr);margin-top:20px"><div class="metric"><b>#${rank||'—'}</b><span>final rank</span></div><div class="metric"><b>${p.score||0}</b><span>total points</span></div><div class="metric"><b>${p.correctCount||0}</b><span>correct answers</span></div></div><h3 style="margin-top:23px">Top Participants</h3>${leaderboardHtml(5)}</section>`,'Game finished')}

function showPreview(){const q=Q[previewIndex];shell(`<section style="max-width:980px;margin:auto">${questionCard(q,true)}<div class="resultPanel"><h3>Correct answer: ${esc(q.answers[q.correctIndex])}</h3><p>${esc(q.explanation)}</p></div><div class="demoNav"><button class="btn soft" id="prevBtn" ${previewIndex===0?'disabled':''}>Previous</button><span>${previewIndex+1} / ${Q.length}</span><button class="btn primary" id="nextBtn">${previewIndex+1===Q.length?'Back Home':'Next'}</button></div></section>`,'Preview mode');prevBtn.onclick=()=>{previewIndex--;showPreview()};nextBtn.onclick=()=>{if(previewIndex+1===Q.length)home();else{previewIndex++;showPreview()}}}
async function runSystemChecks(){const results=[];results.push({name:'Question bank',status:Q.length===30?'pass':'fail',detail:`${Q.length} of 30 questions loaded`});const cats=new Set(Q.map(x=>x.category));results.push({name:'Five categories',status:cats.size===5?'pass':'fail',detail:`${cats.size} categories detected`});let images=0;await Promise.all(Q.map(q=>new Promise(res=>{const im=new Image();im.onload=()=>{images++;res()};im.onerror=res;im.src=q.image})));results.push({name:'Question images',status:images===30?'pass':'fail',detail:`${images} of 30 images loaded`});try{LS.setItem('archcmu_test','1');LS.removeItem('archcmu_test');results.push({name:'Browser storage',status:'pass',detail:'Available'})}catch{results.push({name:'Browser storage',status:'fail',detail:'Unavailable'})}try{await loadLibraries(false);results.push({name:'QR generator',status:typeof qrcode==='function'?'pass':'fail',detail:typeof qrcode==='function'?'Ready':'Not loaded'})}catch{results.push({name:'QR generator',status:'fail',detail:'Library unavailable'})}try{audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();results.push({name:'Sound system',status:'pass',detail:'Web Audio available'})}catch{results.push({name:'Sound system',status:'warn',detail:'Sound unavailable'})}results.push({name:'Live transport',status:LOCAL_MODE?'warn':connection==='live'?'pass':'warn',detail:LOCAL_MODE?'Local rehearsal mode':connection==='live'?brokerLabel:'Connect by hosting a room'});systemResults=results;return results}
async function showSystemCheck(){shell(`<section class="panel center"><div class="loader"></div><h2>Running System Check…</h2></section>`,'System check');const r=await runSystemChecks();shell(`<section class="panel" style="max-width:850px;margin:auto"><div class="eyebrow">Host Readiness</div><h2>System Check</h2><div class="checkGrid">${r.map(x=>`<div class="checkItem ${x.status}"><div><strong>${esc(x.name)}</strong><small style="display:block;color:var(--muted)">${esc(x.detail)}</small></div><b>${x.status==='pass'?'PASSED':x.status==='warn'?'WARNING':'FAILED'}</b></div>`).join('')}</div><div class="actions"><button class="btn primary" id="backBtn">Back</button><button class="btn soft" id="rerunBtn">Run Again</button>${role==='host'?'<button class="btn gold" id="testBtn">Open Test Player</button>':''}</div></section>`,'System check');backBtn.onclick=()=>role==='host'?renderHost():home();rerunBtn.onclick=showSystemCheck;document.getElementById('testBtn')?.addEventListener('click',()=>window.open(joinUrl(),'_blank'))}
function celebrate(){tone(660,.12);setTimeout(()=>tone(880,.15),150);const wrap=document.createElement('div');wrap.className='confetti';for(let i=0;i<120;i++){const s=document.createElement('span');s.style.left=Math.random()*100+'%';s.style.background=['#f3a712','#1458a6','#2c8a52','#c83939'][i%4];s.style.animationDelay=Math.random()*1.8+'s';s.style.transform=`rotate(${Math.random()*180}deg)`;wrap.appendChild(s)}document.body.appendChild(wrap);setTimeout(()=>wrap.remove(),5200)}

async function boot(){if(role==='host'&&room){setConnection('connecting','Reconnecting');const saved=JSON.parse(SS.getItem('archcmu_host_state')||'null');state=saved&&saved.room===room?saved:{version:4,room,createdAt:Date.now(),expiresAt:Date.now()+4*60*60*1000,phase:'lobby',questionIndex:-1,questionStartedAt:0,paused:false,answerCount:0,players:{}};hostAnswers=JSON.parse(SS.getItem('archcmu_host_answers')||'{}');renderHost();try{await loadLibraries(false).catch(()=>{});renderHost();await connectTransport('host');publishState();renderHost()}catch(e){setConnection('offline',e.message);brokerLabel=e.message;renderHost()}}else if(role==='player'&&room)showJoinForm();else home()}
boot();
})();
</script></body></html>
